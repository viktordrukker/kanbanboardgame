services:
  postgres:
    image: postgres:16-alpine
    container_name: kbg-postgres
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban_game
    # No host port binding — only reachable by other containers on kbg-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban_game"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kbg-net

  init:
    build:
      context: ./kanban-game
      dockerfile: Dockerfile
      # Use the builder stage — it has full node_modules + prisma CLI
      target: builder
    container_name: kbg-init
    # Push schema on every startup (idempotent — safe to re-run)
    entrypoint: ["npx", "prisma", "db", "push", "--url", "postgresql://kanban:kanban@postgres:5432/kanban_game"]
    environment:
      DATABASE_URL: postgresql://kanban:kanban@postgres:5432/kanban_game
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - kbg-net

  app:
    build:
      context: ./kanban-game
      dockerfile: Dockerfile
    container_name: kbg-app
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://kanban:kanban@postgres:5432/kanban_game
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production-use-32-chars}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - kbg-net

networks:
  kbg-net:
    driver: bridge

volumes:
  postgres_data:
